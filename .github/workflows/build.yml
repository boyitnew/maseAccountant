name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install NDK 27.3
        run: echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.3.13750724" --sdk_root=${ANDROID_HOME}

      - name: Create local.properties
        run: |
          mkdir -p android
          cat > android/local.properties << 'EOF'
          sdk.dir=$ANDROID_HOME
          cmake.dir=$ANDROID_HOME/cmake/3.31.5
          EOF

      - name: Build APK
        run: |
          cd android
          export CMAKE_VERSION=3.31.5
          ./gradlew assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: android/app/build/outputs/apk/release/*.apk

      - name: Get version
        id: version
        run: |
          echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.sha }}
          name: Release v${{ steps.version.outputs.version }}
          files: android/app/build/outputs/apk/release/*.apk