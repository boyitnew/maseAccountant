name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install NDK 27.3
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.3.13750724" --sdk_root=${ANDROID_HOME}

      - name: Create local.properties
        run: |
          mkdir -p android
          cat > android/local.properties << 'EOF'
          sdk.dir=$ANDROID_HOME
          cmake.dir=$ANDROID_HOME/cmake/3.31.5
          EOF

      - name: Build release APK (universal + per-abi)
        run: |
          cd android
          export CMAKE_VERSION=3.31.5
          ./gradlew assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/app-universal-release.apk 2>/dev/null || true
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            apk="android/app/build/outputs/apk/release/app-${abi}-release.apk"
            if [ -f "$apk" ]; then
              cp "$apk" "artifacts/"
            fi
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk

      - name: Get version name
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.sha }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            خودکار ساخته شده از آخرین تغییرات روی master.
            APK معماری مناسب گوشی خود را دانلود کنید:
            - **arm64-v8a** → گوشی‌های جدید (سامسونگ، شیائومی، هواوی ۲۰۲۰+)
            - **armeabi-v7a** → گوشی‌های قدیمی
            - **universal** → همه معماری‌ها (حجم بالا)
          files: artifacts/*.apk
